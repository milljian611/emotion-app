<style>
:root {
  --primary: #FF7E5F; --primary-light: #FFB088; --primary-lighter: #FFD4C0; --primary-dark: #E8634A;
  --primary-gradient: linear-gradient(135deg, #FF7E5F 0%, #FFB088 50%, #FFD4C0 100%);
  --secondary: #FFB347; --accent-pink: #FF9EB5; --accent-peach: #FFCBA4;
  --accent-lavender: #C9A0FF; --accent-mint: #7DD4B0; --accent-sky: #7EC8E3;
  --bg-primary: #FFFAF6; --bg-secondary: #FFF2EA; --bg-card: #FFFFFF;
  --bg-glass: rgba(255,255,255,0.65); --bg-glass-strong: rgba(255,255,255,0.85);
  --text-primary: #2D1F1F; --text-secondary: #7A6B6B; --text-hint: #B8A8A0;
  --emotion-happy: #FFD93D; --emotion-calm: #7DD4B0; --emotion-anxious: #FF7E5F;
  --emotion-sad: #7EC8E3; --emotion-angry: #FF6B6B; --emotion-excited: #FFB347;
  --emotion-tired: #C4A8D4; --emotion-grateful: #FF9EB5;
  --radius-sm: 10px; --radius-md: 14px; --radius-lg: 20px; --radius-xl: 28px;
  --shadow-sm: 0 2px 8px rgba(255,126,95,0.08); --shadow-md: 0 4px 20px rgba(255,126,95,0.12);
  --shadow-lg: 0 8px 40px rgba(255,126,95,0.16); --shadow-xl: 0 16px 60px rgba(255,126,95,0.20);
  --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'SF Pro Display', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; }
body { font-family:var(--font-family); background:var(--bg-primary); color:var(--text-primary); position:fixed; top:0; left:0; right:0; bottom:0; overscroll-behavior:none; }
#app { width:100%; height:100%; position:relative; overflow:hidden; }
.status-bar { height:calc(54px + var(--safe-top)); display:flex; justify-content:space-between; align-items:flex-end; padding:0 28px calc(6px + var(--safe-top)); font-size:15px; font-weight:600; position:relative; z-index:100; flex-shrink:0; }
.status-bar .time { font-size:16px; font-weight:700; }
.page { position:absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; touch-action:pan-y; }
.page.active { display:flex; }
.page::-webkit-scrollbar { display:none; }
.nav-bar { height:48px; display:flex; justify-content:space-between; align-items:center; padding:0 20px; background:var(--bg-primary); position:sticky; top:0; z-index:50; flex-shrink:0; }
.nav-bar .nav-title { font-size:17px; font-weight:700; letter-spacing:0.3px; }
.nav-btn { width:38px; height:38px; display:flex; align-items:center; justify-content:center; border:none; background:var(--bg-secondary); border-radius:50%; cursor:pointer; }
.btn-primary { width:85%; margin:0 auto; padding:15px 0; background:var(--primary-gradient); color:white; border:none; border-radius:var(--radius-sm); font-size:16px; font-weight:700; cursor:pointer; box-shadow:0 6px 24px rgba(255,126,95,0.35); letter-spacing:1px; font-family:var(--font-family); }
.btn-secondary { padding:12px 28px; background:var(--bg-secondary); color:var(--text-secondary); border:none; border-radius:var(--radius-sm); font-size:14px; font-weight:500; cursor:pointer; font-family:var(--font-family); }
.content { flex:1; padding:20px; padding-bottom:calc(90px + var(--safe-bottom)); }
.tab-bar { position:absolute; bottom:0; left:0; width:100%; height:calc(82px + var(--safe-bottom)); background:var(--bg-glass-strong); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); display:flex; justify-content:space-around; align-items:flex-start; padding-top:8px; padding-bottom:var(--safe-bottom); border-top:1px solid rgba(255,126,95,0.08); z-index:100; }
.tab-item { display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; padding:6px 12px; }
.tab-item .tab-icon { width:26px; height:26px; }
.tab-item .tab-label { font-size:10px; color:var(--text-hint); font-weight:500; }
.tab-item.active .tab-label { color:var(--primary); font-weight:600; }
.card { background:var(--bg-card); border-radius:var(--radius-md); padding:20px; box-shadow:var(--shadow-sm); margin-bottom:16px; border:1px solid rgba(255,126,95,0.04); }
.tabs { display:flex; justify-content:center; gap:24px; padding:8px 0; margin-bottom:20px; }
.tab { padding:8px 20px; font-size:14px; font-weight:500; color:var(--text-hint); cursor:pointer; border-bottom:2.5px solid transparent; }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:700; }
.input-field { width:100%; padding:14px 18px; border:1.5px solid var(--primary-lighter); border-radius:var(--radius-sm); font-size:14px; background:var(--bg-card); color:var(--text-primary); outline:none; font-family:var(--font-family); }
.input-field::placeholder { color:var(--text-hint); }
.toggle-switch { width:52px; height:30px; background:#E0D5CE; border-radius:15px; position:relative; cursor:pointer; transition:background 0.3s; flex-shrink:0; }
.toggle-switch.on { background:var(--primary); }
.toggle-switch::after { content:''; width:24px; height:24px; background:white; border-radius:50%; position:absolute; top:3px; left:3px; transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow:0 2px 6px rgba(0,0,0,0.15); }
.toggle-switch.on::after { transform:translateX(22px); }
.modal-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.35); backdrop-filter:blur(8px); display:none; justify-content:center; align-items:center; z-index:300; }
.modal-overlay.show { display:flex; }
.modal-content { background:var(--bg-card); border-radius:var(--radius-xl); padding:32px 28px; width:85%; text-align:center; box-shadow:var(--shadow-xl); }
.bottom-sheet { position:absolute; bottom:0; left:0; width:100%; background:var(--bg-card); border-radius:var(--radius-xl) var(--radius-xl) 0 0; padding:12px 24px calc(40px + var(--safe-bottom)); z-index:300; display:none; box-shadow:0 -8px 40px rgba(0,0,0,0.12); }
.bottom-sheet.show { display:block; }
.slider-track { width:100%; height:6px; background:var(--bg-secondary); border-radius:3px; position:relative; margin:8px 0; }
.slider-fill { height:100%; background:var(--primary-gradient); border-radius:3px; }
.slider-thumb { width:22px; height:22px; background:white; border:3px solid var(--primary); border-radius:50%; position:absolute; top:50%; transform:translate(-50%,-50%); box-shadow:0 2px 8px rgba(255,126,95,0.3); }
.emoji-bubble { width:52px; height:52px; display:flex; align-items:center; justify-content:center; font-size:26px; border-radius:50%; background:var(--bg-secondary); cursor:pointer; transition:all 0.25s; flex-shrink:0; border:2px solid transparent; }
.emoji-bubble.selected { background:var(--primary-lighter); border-color:var(--primary); box-shadow:0 4px 16px rgba(255,126,95,0.25); transform:scale(1.08); }
.progress-bar { height:4px; background:var(--bg-secondary); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:var(--primary-gradient); border-radius:2px; }
.deco-blob { position:absolute; border-radius:50%; filter:blur(60px); opacity:0.15; pointer-events:none; }
@keyframes breathe { 0%,100% { transform:scale(1); opacity:0.5; } 50% { transform:scale(1.35); opacity:1; } }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.04); } }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
@keyframes glow { 0%,100% { box-shadow:0 0 20px rgba(255,126,95,0.3); } 50% { box-shadow:0 0 40px rgba(255,126,95,0.5); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.breathe { animation:breathe 4s ease-in-out infinite; }
.pulse { animation:pulse 2.5s ease-in-out infinite; }
.float { animation:float 3s ease-in-out infinite; }
.glow { animation:glow 2s ease-in-out infinite; }
.fade-in { animation:fadeIn 0.5s ease; }
#splash-screen { position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:var(--bg-primary); display:flex; flex-direction:column; justify-content:center; align-items:center; transition:opacity 0.5s ease, visibility 0.5s ease; }
#splash-screen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
#splash-screen .splash-icon { width:110px; height:110px; border-radius:28px; background:var(--primary-gradient); display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-xl); margin-bottom:28px; animation:glow 2s ease-in-out infinite; }
#splash-screen .splash-title { font-size:26px; font-weight:800; color:var(--text-primary); margin-bottom:8px; letter-spacing:2px; }
#splash-screen .splash-sub { font-size:15px; color:var(--text-secondary); margin-bottom:48px; letter-spacing:4px; }
#splash-screen .splash-loader { width:40px; height:3px; background:var(--primary-lighter); border-radius:2px; overflow:hidden; }
#splash-screen .splash-loader-fill { width:0%; height:100%; background:var(--primary-gradient); border-radius:2px; transition:width 0.3s ease; }
#pwa-banner { position:fixed; bottom:calc(90px + var(--safe-bottom)); left:12px; right:12px; background:var(--bg-card); border-radius:var(--radius-md); padding:16px 20px; box-shadow:var(--shadow-lg); z-index:200; display:none; animation:slideUp 0.4s ease; border:1px solid rgba(255,126,95,0.1); }
#pwa-banner .banner-content { display:flex; align-items:center; gap:14px; }
#pwa-banner .banner-icon { width:44px; height:44px; border-radius:12px; background:var(--primary-gradient); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
#pwa-banner .banner-text { flex:1; }
#pwa-banner .banner-title { font-size:14px; font-weight:700; }
#pwa-banner .banner-desc { font-size:12px; color:var(--text-secondary); margin-top:2px; }
#pwa-banner .banner-close { width:28px; height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:50%; background:var(--bg-secondary); flex-shrink:0; font-size:14px; color:var(--text-hint); }
#pwa-banner .banner-btn { padding:8px 16px; background:var(--primary-gradient); color:white; border:none; border-radius:var(--radius-sm); font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font-family); flex-shrink:0; }
#swipe-back-indicator { position:fixed; left:0; top:0; width:4px; height:100%; z-index:400; background:var(--primary); border-radius:0 4px 4px 0; transform:scaleY(0); transform-origin:center; transition:transform 0.15s ease; pointer-events:none; }
#swipe-back-indicator.active { transform:scaleY(0.6); }
</style>

    <div class="banner-text"><div class="banner-title">添加到主屏幕</div><div class="banner-desc">获得更好的全屏体验</div></div>

<script>
function updateClock(){var n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0');document.querySelectorAll('.status-bar .time').forEach(function(e){e.textContent=h+':'+m;});}
setInterval(updateClock,1000);updateClock();
(function(){var l=document.getElementById('splashLoader'),p=0;var i=setInterval(function(){p+=Math.random()*25+10;if(p>=100){p=100;l.style.width='100%';clearInterval(i);setTimeout(function(){document.getElementById('splash-screen').classList.add('hidden');},400);}else{l.style.width=p+'%';}},300);})();
var deferredPrompt;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;setTimeout(function(){if(!localStorage.getItem('pwa-banner-dismissed'))document.getElementById('pwa-banner').style.display='block';},3000);});
function installPWA(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(r){if(r.outcome==='accepted')dismissBanner();deferredPrompt=null;});}else{alert('请使用浏览器菜单中的"添加到主屏幕"功能');}}
function dismissBanner(){document.getElementById('pwa-banner').style.display='none';localStorage.setItem('pwa-banner-dismissed','true');}
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});}
(function(){var ind=document.getElementById('swipe-back-indicator'),sx=0,sy=0,sw=false,hist=['splash'];
window.pushPageHistory=function(id){if(hist[hist.length-1]!==id)hist.push(id);};
document.addEventListener('touchstart',function(e){var t=e.touches[0];if(t.clientX<30){sx=t.clientX;sy=t.clientY;sw=true;}},{passive:true});
document.addEventListener('touchmove',function(e){if(!sw)return;var t=e.touches[0];if(t.clientX-sx>20&&Math.abs(t.clientY-sy)<Math.abs(t.clientX-sx))ind.classList.add('active');},{passive:true});
document.addEventListener('touchend',function(e){if(!sw)return;sw=false;ind.classList.remove('active');var t=e.changedTouches[0];if(t.clientX-sx>80&&hist.length>1){hist.pop();showPage(hist[hist.length-1],true);}},{passive:true});
})();
</script>

const frame = document.getElementById('app');
Object.keys(pages).forEach(id => {
  const div = document.createElement('div');
  div.className = 'page' + (id === 'splash' ? ' active' : '');
  div.id = 'page-' + id;
  div.innerHTML = pages[id];
  frame.appendChild(div);
});

// Now inject remaining pages
// ===== Page switching function =====
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + pageId);
  if (target) { target.classList.add('active'); target.scrollTop = 0; }
  
}

function selectOption(btn) {
  document.querySelectorAll('.option-btn').forEach(b => {
    b.style.borderColor = 'var(--primary-lighter)'; b.style.background = 'var(--bg-card)'; b.style.color = 'var(--text-primary)';
  });
  btn.style.borderColor = 'var(--primary)'; btn.style.background = 'var(--primary-lighter)'; btn.style.color = 'var(--primary-dark)';
  const nextBtn = document.getElementById('qNextBtn');
  if (nextBtn) { nextBtn.classList.remove('disabled'); nextBtn.style.opacity = '1'; }
}

function showModal(id) { const m = document.getElementById(id); if(m) m.classList.add('show'); }
function hideModal(id) { const m = document.getElementById(id); if(m) m.classList.remove('show'); }
function showBottomSheet(id) { const s = document.getElementById(id); if(s) s.classList.add('show'); }
function hideBottomSheet(id) { const s = document.getElementById(id); if(s) s.classList.remove('show'); }

function switchTrendView(tab, view) {
  tab.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('trend-day').style.display = view === 'day' ? 'block' : 'none';
  document.getElementById('trend-week').style.display = view === 'week' ? 'block' : 'none';
  document.getElementById('trend-month').style.display = view === 'month' ? 'block' : 'none';
}

function switchReliefLevel(tab, level) {
  tab.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('relief-mild').style.display = level === 'mild' ? 'block' : 'none';
  document.getElementById('relief-moderate').style.display = level === 'moderate' ? 'block' : 'none';
  document.getElementById('relief-severe').style.display = level === 'severe' ? 'block' : 'none';
}

let lightOn = true;
function toggleLight() {
  lightOn = !lightOn;
  const sw = document.getElementById('lightSwitch');
  if (lightOn) { sw.style.background = 'var(--primary-gradient)'; sw.style.boxShadow = 'var(--shadow-xl), 0 0 40px rgba(255,126,95,0.3)'; sw.nextElementSibling.textContent = '灯光已开启'; }

}
